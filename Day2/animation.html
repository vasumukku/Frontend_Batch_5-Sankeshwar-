<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Animation</title>
  <style>
   .main-box {
    height: 400px;
    width: 400px;
    border: 2px solid black;
    background-color: red;

    animation: moveBox 1s ease-in-out infinite alternate;
}

@keyframes moveBox {
    0%   { transform: rotate(150deg); }
    50%  { transform: rotate(250deg); }
    100% { transform: rotate(360deg); }
}
  </style>
</head>
<body>
  <div class="main-box">

  </div>
</body>
</html>
